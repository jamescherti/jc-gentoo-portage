_apply_compiler_optimizations() {
  local var_name="$1"

  # Perform all operations inside a subshell to isolate shopt changes.
  # The output of this subshell is the cleaned and optimized string.
  local val
  val=$(
    shopt -s extglob
    local v=" ${!var_name} "

    # Strip existing optimization flags
    while [[ "${v}" == *" -O"?(fast|[0-3sgz])" "* ]]; do
      v="${v// -O?(fast|[0-3sgz])/}"
    done

    # Append -O3 and cleanup
    v="${v} -O3"
    v="${v//+( )/ }"
    v="${v# }"
    v="${v% }"

    printf "%s" "${v}"
  )

  printf -v "${var_name}" "%s" "${val}"
}

# Optimize base compiler flags for stability and performance.
# Note: LDFLAGS is explicitly defined here as lto.conf appends CFLAGS to
#       LDFLAGS.
for _var in BASE_COMPILER_FLAGS COMMON_FLAGS CFLAGS CXXFLAGS FCFLAGS FFLAGS LDFLAGS; do
  _apply_compiler_optimizations "${_var}"
done

# For C programs built as modules from Go.
for _var in CGO_CFLAGS CGO_CXXFLAGS CGO_FFLAGS CGO_FCFLAGS; do
  _apply_compiler_optimizations "${_var}"
done

# Clean up the environment namespace to prevent ebuild pollution
unset -f _apply_compiler_optimizations
unset _var

