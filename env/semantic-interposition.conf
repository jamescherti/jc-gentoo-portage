# -fno-semantic-interposition: Disables ELF semantic interposition assumptions
# for position-independent code. This allows the compiler to assume that symbols
# defined within the current shared object will not be replaced at runtime
# through mechanisms such as LD_PRELOAD or symbol interposition.
#
# By removing this constraint, GCC can perform more aggressive optimizations,
# including direct function calls, cross-translation-unit inlining, constant
# propagation, devirtualization, and other LTO-enabled optimizations that would
# otherwise be inhibited by PLT indirection.
#
# The trade-off is reduced compatibility with software that intentionally relies
# on interposing symbols from shared libraries. As a result, this flag should
# not be enabled globally without testing.
#
# A notable exception is dev-lang/python (CPython ). The interpreter performs a
# large number of internal calls within libpython, making it sensitive to PLT
# overhead and missed inlining opportunities. When combined with LTO,
# -fno-semantic-interposition has been shown to improve Python performance by
# approximately 20-30% in interpreter-heavy workloads, which is why
# distributions such as Red Hat Enterprise Linux enable it for Python builds.
#
# URLs:
# - https://developers.redhat.com/blog/2020/06/25/red-hat-enterprise-linux-8-2-brings-faster-python-3-8-run-speeds
# - https://fedoraproject.org/wiki/Changes/PythonNoSemanticInterpositionSpeedup
CFLAGS="${CFLAGS} -fno-semantic-interposition"
CXXFLAGS="${CXXFLAGS} -fno-semantic-interposition"
