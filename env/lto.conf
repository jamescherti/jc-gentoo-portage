# Enables link-time optimization (LTO), allowing cross translation-unit
# optimization during the final link stage. Supported by GCC and Clang.
# Increases build time and memory usage, but can improve runtime performance and
# reduce binary size in optimization-heavy builds.
# TODO Fix
# if [[ "${CC}" == *clang* || "${CXX}" == *clang* ]]; then
#   _LTO_FLAG="-flto=thin"
# else
#   _LTO_FLAG="-flto=auto"
# fi

# TODO limit the processors?
_LTO_FLAG="-flto=auto"

CFLAGS="${CFLAGS} ${_LTO_FLAG}"
CXXFLAGS="${CXXFLAGS} ${_LTO_FLAG}"
LDFLAGS="${LDFLAGS} ${COMMON_FLAGS} ${_LTO_FLAG}"

# Promote specific classes of link-time optimization issues to errors. These
# diagnostics typically indicate violations of the One Definition Rule (ODR),
# type mismatches across translation units, or unsafe aliasing assumptions.
# Treating them as errors forces early detection of inconsistencies that may
# otherwise manifest as undefined behavior at runtime in optimized builds.
#
# -Werror=lto-type-mismatch: This is the MVP of LTO diagnostics. If file_a.c
# declares a global variable as an int, and file_b.c declares that same extern
# variable as a long, a normal build might silently link them and corrupt your
# memory. LTO catches this, and making it an error is an absolute necessity for
# safe LTO builds.
#
# -Werror=odr: The One Definition Rule (ODR) is strictly a C++ concept. While it
# is perfectly fine to have this in your CFLAGS (GCC/Clang will generally just
# ignore it for C code), it does its heavy lifting in your CXXFLAGS. It prevents
# the nightmare scenario of having two different C++ classes with the exact same
# name but different member variables in different files.
#
# -Werror=strict-aliasing: This is your biggest risk for build failures. While
# enforcing strict aliasing prevents nasty optimization bugs, a massive amount
# of legacy C and C++ code violates aliasing rules (often by casting pointers to
# different types).
#
# (If you are compiling your own codebase, these flags are a good way to enforce
# strict code hygiene. However, if you are building an entire operating system,
# like Gentoo, or compiling large third-party libraries, -Werror=strict-aliasing
# and -Werror=lto-type-mismatch will cause some builds to fail.)
CFLAGS="${CFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"
CXXFLAGS="${CXXFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"
