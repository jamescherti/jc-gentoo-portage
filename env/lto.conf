# -flto: Deeper optimization, supported by GCC and Clang. Useful for GCC users
# or when maximum optimization is required.
CFLAGS="${CFLAGS} -flto"
CXXFLAGS="${CXXFLAGS} -flto"
LDFLAGS="${LDFLAGS} ${COMMON_FLAGS} -flto"

# -fno-semantic-interposition: When LTO merges shared libraries together,
# standard C/C++ rules prevent it from inlining certain functions just in case
# another library overrides them later. This flag tells the compiler "assume no
# one will override this." It allows massive inlining across library boundaries.
# (This alone provides up to a 20% speedup for dynamic programs like Python).
CFLAGS="${CFLAGS} -fno-semantic-interposition"
CXXFLAGS="${CXXFLAGS} -fno-semantic-interposition"

# Safety Guardrails (Strict Mode) LTO exposes hidden structural bugs by merging
# previously separate files. We promote these warnings to ERRORS so the build
# fails immediately, rather than silently generating a corrupted binary that
# randomly segfaults.
CFLAGS="${CFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"
CXXFLAGS="${CXXFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"
