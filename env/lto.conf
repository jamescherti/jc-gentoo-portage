# -flto: Enables link-time optimization (LTO), allowing cross translation-unit
# optimization during the final link stage. Supported by GCC and Clang.
# Increases build time and memory usage, but can improve runtime performance and
# reduce binary size in optimization-heavy builds.
CFLAGS="${CFLAGS} -flto"
CXXFLAGS="${CXXFLAGS} -flto"
LDFLAGS="${LDFLAGS} ${COMMON_FLAGS} -flto"

# Promote specific classes of link-time optimization issues to errors. These
# diagnostics typically indicate violations of the One Definition Rule (ODR),
# type mismatches across translation units, or unsafe aliasing assumptions.
# Treating them as errors forces early detection of inconsistencies that may
# otherwise manifest as undefined behavior at runtime in optimized builds.
CFLAGS="${CFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"
CXXFLAGS="${CXXFLAGS} -Werror=odr -Werror=lto-type-mismatch -Werror=strict-aliasing"

# -fno-semantic-interposition: Disables assumptions required for ELF
# interposition semantics when building position-independent code. This allows
# the compiler to assume that local definitions will not be overridden at
# runtime (e.g. via LD_PRELOAD or symbol interposition), enabling more
# aggressive inlining and devirtualization across shared library boundaries.
# Note: This can break code relying on symbol interposition behavior.
#
# TODO
# It can break some shared libraries. However, it is the secret weapon for
# Python. If you ever decide to build dev-lang/python, passing
# -fno-semantic-interposition alongside LTO can yield up to a 20-30% performance
# boost in Python execution speed.
# CFLAGS="${CFLAGS} -fno-semantic-interposition"
# CXXFLAGS="${CXXFLAGS} -fno-semantic-interposition"
