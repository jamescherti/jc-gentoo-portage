#-----------------------------------------------------------------------------
# COMPILER FLAGS
#-----------------------------------------------------------------------------
AW_FLAGS="-march=native -mtune=native"
COMMON_FLAGS="${AW_FLAGS} -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Not needed, as portage does this automatically, and stripping should be handled by $FEATURES
#LDFLAGS="${LDFLAGS} -Wl,--strip-all"

# For C programs built as modules from Go.
CGO_CFLAGS="${COMMON_FLAGS}"
CGO_CXXFLAGS="${COMMON_FLAGS}"
CGO_FFLAGS="${COMMON_FLAGS}"
GCO_FCFLAGS="${COMMON_FLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

# Rust
RUSTFLAGS="-C target-cpu=native -C opt-level=2 -C strip=symbols"

# We recommend that the smaller of: number of threads, or ram/2GB is used.
# So, for a dual-core processor w/ HT and 8GB of RAM, that's: min(4, 8) = 4
#
# Cap total compile threads and enforce a strict compiler load limit
MAKEOPTS="-j14 -l16"
NINJAFLAGS="${MAKEOPTS}"

#-----------------------------------------------------------------------------
# Customizations
#-----------------------------------------------------------------------------
PYTHON_SINGLE_TARGET="python3_14"

# LUA_SINGLE_TARGET="lua5-4"
# LUA_TARGETS="lua5-4"

QEMU_SOFTMMU_TARGETS="x86_64"
QEMU_USER_TARGETS="x86_64"

#-----------------------------------------------------------------------------
# Misc
#-----------------------------------------------------------------------------
EMERGE_DEFAULT_OPTS="--jobs=1 --load-average=16 --autounmask-write=n"
PORTAGE_NICENESS="10"
FEATURES = "parallel-fetch parallel-install"

DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"
BINPKG_COMPRESS="zstd"
BINPKG_FORMAT="gpkg"

# This sets the language of build output to English. Please keep this setting
# intact when reporting bugs.
LC_MESSAGES=C
LINGUAS="en"
L10N="en en-US"

ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE"

# The CONFIG_PROTECT variable contains a space-delimited list of directories #
# where Portage will not blindly copy over new versions of files, but instead
# treat the files as configuration files where the user should manually check if
# the changes are needed and valid or not.
CONFIG_PROTECT="/etc/environment /etc/security/limits.conf /etc/dnscrypt-proxy/dnscrypt-proxy.toml /etc/genkernel.conf /etc/systemd/journald.conf /etc/systemd/timesyncd.conf /etc/ssh/sshd_config /etc/distcc/hosts /etc/systemd/system/distccd.service.d/00gentoo.conf"

#-----------------------------------------------------------------------------
# Customizations
#-----------------------------------------------------------------------------
OFFICE_IMPLEMENTATION=libreoffice

#-----------------------------------------------------------------------------
# USE
#-----------------------------------------------------------------------------
# Global use https://packages.gentoo.org/useflags/global
USE=""

# Codecs
USE="$USE -cdda -dvd -dvdr -cdr -css x265 flac faad matroska twolame mp3 mp4 mpeg ogg aac opus speex vpx aom fdk vorbis theora ffmpeg lame"

# Removed dvd (a52) and cdrom
USE="$USE -cdrom -a52"

# Images
USE="$USE gif svg jpeg webp png"

# COMPRESSION
USE="$USE zlib bzip2 lzma zstd lz4 lzo zip"

# Flatpak
USE="$USE flatpak"

# Misc
# logind fixes issues with creating tty
# nvme: nvme disks
USE="$USE nvme apparmor -wxwidgets bluetooth -samba lvm bash-completion lm-sensors hddtemp verify-sig -kerberos cryptsetup"
