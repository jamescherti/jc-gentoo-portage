#-----------------------------------------------------------------------------
# COMPILER FLAGS
#-----------------------------------------------------------------------------
AW_FLAGS="-march=native -mtune=native"
COMMON_FLAGS="${AW_FLAGS} -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

# Not needed, as portage does this automatically, and stripping should be handled by $FEATURES
#LDFLAGS="${LDFLAGS} -Wl,--strip-all"

# For C programs built as modules from Go.
CGO_CFLAGS="${COMMON_FLAGS}"
CGO_CXXFLAGS="${COMMON_FLAGS}"
CGO_FFLAGS="${COMMON_FLAGS}"
CGO_FCFLAGS="${COMMON_FLAGS}"
CGO_LDFLAGS="${LDFLAGS}"

# Rust
RUSTFLAGS="-C target-cpu=native -C opt-level=2 -C strip=symbols"

# We recommend that the smaller of: number of threads, or ram/2GB is used.
# So, for a dual-core processor w/ HT and 8GB of RAM, that's: min(4, 8) = 4
#
# Cap total compile threads and enforce a strict compiler load limit
MAKEOPTS="-j5 -l5"
NINJAFLAGS="${MAKEOPTS}"

#-----------------------------------------------------------------------------
# Customizations
#-----------------------------------------------------------------------------
PYTHON_SINGLE_TARGET="python3_14"

# LUA_SINGLE_TARGET="lua5-4"
# LUA_TARGETS="lua5-4"

QEMU_SOFTMMU_TARGETS="x86_64"
QEMU_USER_TARGETS="x86_64"

#-----------------------------------------------------------------------------
# Misc
#-----------------------------------------------------------------------------
EMERGE_DEFAULT_OPTS="--jobs=1 --load-average=16 --autounmask-write=n"
PORTAGE_NICENESS="5"

# parallel-fetch: Parallel downloads
# parallel-install: Parallel installation
#
# candy: Enhanced output.
# Replaces the standard static build indicators with a
# dynamic progress bar. It does not provide any performance optimizations, but
# it offers better visual feedback during prolonged compilation sequences.
#
# binpkg-logs: Forces Portage to preserve detailed compilation and transaction
# logs for binary packages. If a pre-compiled binary package encounters a
# deployment failure or a post-install script error, this feature ensures the
# diagnostic logs are saved to disk rather than silently discarded.
#
# sandbox: This is a critical system safety feature that is enabled by default.
# It launches an isolated, restricted execution environment for the compilation
# phase. If an unverified or poorly scripted compilation Makefile attempts to
# write directly to vital system directories (like /bin or /etc) before the
# package is officially installed, the sandbox blocks the unauthorized write and
# halts the transaction, protecting the OS from corruption.
#
# (TODO add buildpkg. This ensures that every time you compile a package,
# Portage saves a pre-compiled binary. If an update breaks your system, you can
# instantly downgrade without recompiling.)
FEATURES = "parallel-fetch parallel-install sandbox"

DISTDIR="/var/cache/distfiles"
PKGDIR="/var/cache/binpkgs"
BINPKG_COMPRESS="zstd"
BINPKG_FORMAT="gpkg"

# This sets the language of build output to English. Please keep this setting
# intact when reporting bugs.
LC_MESSAGES=C
LINGUAS="en"
L10N="en en-US"

ACCEPT_LICENSE="-* @FREE @BINARY-REDISTRIBUTABLE"

# Instructs Portage to discard the upstream default versions of these specific
# files during the installation phase. This ensures local custom configurations
# are preserved and prevents etc-update from generating staging files for these
# paths.
INSTALL_MASK="/etc/inputrc /etc/locale.gen /etc/hosts
/etc/genkernel.conf /etc/environment"

# The CONFIG_PROTECT variable contains a space-delimited list of files and
# directories that Portage will protect from automatic modification. Proposed
# changes to protected configuration locations will require manual merges from
# the system administrator (see dispatch-conf or similar merge tools).

# The CONFIG_PROTECT_MASK variable contains a list of files or subdirectories
# which will be excluded from the overwrite protection offered by the
# CONFIG_PROTECT variable. This is to say that files or subdirectories mentioned
# in this variable will be overwritten by Portage upon (re)installation.
# "Masking" is useful when locations within a certain parent directory are
# protected from automatic overwrites - excluded from the package manager's
# control, but a certain child location should be included in the package
# manager's control.
#
# /etc/ssl/certs: The app-misc/ca-certificates package installs .pem files into
# /etc/ssl/certs/. Because this path falls under the protected /etc directory,
# Portage treats each certificate as a distinct configuration file. The standard
# solution is to unprotect the certificate directory.
#
# /etc/ca-certificates.conf: This file dictates which certificates from
# /usr/share/ca-certificates are trusted and active. Unprotecting it allows
# Portage to automatically update this trust list to the upstream maintainer's
# defaults during package updates.
CONFIG_PROTECT_MASK="/etc/ssl/certs /etc/ca-certificates.conf"

#-----------------------------------------------------------------------------
# Customizations
#-----------------------------------------------------------------------------
OFFICE_IMPLEMENTATION=libreoffice

# Removed: -nlpsolver -scripting-beanshell -scripting-javascript -wiki-publisher
#
# nlpsolver: Adds specialized non-linear financial/engineering math solvers;
# dead weight for standard formulas.
#
# wiki-publisher: Connects to remote MediaWiki servers to upload docs directly;
# useless for local editing.
#
# scripting-beanshell: Runs external Java-based BeanShell macro scripts; a
# massive source of unused code paths.
#
# scripting-javascript: Executes embedded JavaScript code within documents; safe
# to drop for standard sheets.
LIBREOFFICE_EXTENSIONS=""

#-----------------------------------------------------------------------------
# USE
#-----------------------------------------------------------------------------
# Global use https://packages.gentoo.org/useflags/global
USE=""

# Codecs
# - ffmpeg: Serves as the unified multimedia master engine.
# - x264 / x265 / vpx / aom: Maximizes modern streaming video playback
#   compatibility (AVC, HEVC, VP9, AV1) while fully activating GPU's hardware
#   accelerated video decoding.
# - opus / vorbis / theora / speex: Ensures structural compatibility with all
#   modern WebRTC, HTML5 video streaming, and online voice applications.
# - matroska: Explicitly passes instructions to applications to optimize
#   container structures for .mkv files.
# - Removed:
USE="$USE gstreamer ffmpeg x264 x265 vpx aom opus speex vorbis theora matroska"

# The dav1d library is the industry reference AV1 software decoder. When
# hardware decoding is unavailable, dav1d uses highly optimized assembly code
# (such as AVX2) to decode high-resolution AV1 streams efficiently. This
# minimizes CPU utilization and thermal overhead compared to alternative
# software decoders during video playback.
#
# SVT-AV1 is primarily an encoder. Rather than enabling the svt-av1 USE flag
# globally, it is better to enable it selectively via /etc/portage/package.use/
# for tools that specifically require AV1 encoding capabilities, such as
# media-video/ffmpeg or media-video/obs-studio.
USE="$USE dav1d"

# REMOVE THIS: External legacy codecs like lame, twolame, and fdk are
# unnecessary because FFmpeg handles 100% of these formats using its own native,
# highly optimized internal encoders and decoders.
# USE="$USE flac faad twolame mp3 mp4 mpeg ogg aac fdk lame "

# Removed cdrom/dvd
# This is an optimization for a lean desktop profile. Unless the machine houses
# a physical optical disc drive, keeping CD/DVD reading and CSS decryption
# routines disabled prevents packages like mpv or ffmpeg from linking against
# hardware optical probing utilities.
USE="$USE -cdrom -a52 -cdda -dvd -dvdr -cdr -css"

# Images
USE="$USE gif svg jpeg webp png"

# COMPRESSION
USE="$USE zlib bzip2 lzma zstd lz4 lzo zip"

# Flatpak
USE="$USE flatpak"

# Misc
# logind fixes issues with creating tty
# nvme: nvme disks (TODO add it to external hardware file)
# TODO remove -wxwidgets?
USE="$USE nvme apparmor -wxwidgets bluetooth -samba lvm bash-completion lm-sensors hddtemp verify-sig cryptsetup"

# NOTE: To find other Gentoo USE flags, check the package.use/ directory.
